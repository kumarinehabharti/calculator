
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title> Calculator</title>
    <link rel="stylesheet" href="./cal.css">
</head>
<body>
<div class="calculator-card">
    <div class="display-wrap">
        <input type="text" id="calc-display" placeholder="0" inputmode="numeric" autofocus>
    </div>
    
    <div class="button-grid" id="button-container">
     
        <button class="btn btn-clear" data-action="clear">AC</button>
        <button class="btn btn-del" data-action="delete">DEL</button>
        <button class="btn btn-operator" data-op="%">%</button>
        <button class="btn btn-operator" data-op="/">÷</button>

        <button class="btn" data-num="7">7</button>
        <button class="btn" data-num="8">8</button>
        <button class="btn" data-num="9">9</button>
        <button class="btn btn-operator" data-op="*">×</button>

        <button class="btn" data-num="4">4</button>
        <button class="btn" data-num="5">5</button>
        <button class="btn" data-num="6">6</button>
        <button class="btn btn-operator" data-op="-">−</button>

        <button class="btn" data-num="1">1</button>
        <button class="btn" data-num="2">2</button>
        <button class="btn" data-num="3">3</button>
        <button class="btn btn-operator" data-op="+">+</button>

        <button class="btn" data-num=".">00</button>
        <button class="btn" data-num=".">0</button>
        <button class="btn" data-num=".">.</button>
        <button class="btn btn-equals" id="equal-btn">=</button>
    </div>
    <div class="skill-footer">
        SkillCraft Technology | DOM Calculator
    </div>
</div>

<script src="./cal.js"></script>
</body>
</html>
